<style>

  .quesevota h4 { font-size: 15px; margin-bottom: 8px; }

<script>
"use strict";
const SEN = JSON.parse(document.getElementById('data-senadores').textContent);
const ESTADO = JSON.parse(document.getElementById('data-estado').textContent);

const ST = {
  impulsa:  { ic: '"▲"', color: 'var(--st-impulsa)',  corto: 'Impulsa' },
  dictamen: { ic: '"◆"', color: 'var(--st-dictamen)', corto: 'Dictamen de mayoría' },
  juego:    { ic: '"●"', color: 'var(--st-juego)',    corto: 'Voto en juego' },
  rechaza:  { ic: '"▼"', color: 'var(--st-rechaza)',  corto: 'Rechaza' },
};
const PROVINCIAS = [...new Set(SEN.map(s => s.provincia))].sort((a, b) => a.localeCompare(b, 'es'));
const app = document.getElementById('app');
let filtro = { prov: '', postura: '', q: '' };

/* ---------- helpers (todo texto va por textContent — nunca innerHTML con datos) ---------- */
function el(tag, attrs, ...hijos) {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === 'text') n.textContent = v;
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), v);
    else n.setAttribute(k, v);
  }
  for (const h of hijos) if (h) n.append(h);
  return n;
}
function stanceVars(s) { return `--sc:${ST[s.postura].color};--ic:${ST[s.postura].ic}`; }

function mailBody(s) {
  const saludo = s.genero === 'F' ? 'Estimada Senadora' : 'Estimado Senador';
  return `${saludo} ${s.apellido}:\n\nMe llamo [TU NOMBRE], soy ciudadano/a de [TU CIUDAD, PROVINCIA]. Le escribo por el proyecto de Inviolabilidad de la Propiedad Privada y su capítulo sobre la Ley de Tierras Rurales 26.737.\n\nEl promedio nacional de extranjerización (5%) esconde el dato relevante: según el Registro Nacional de Tierras Rurales, 36 departamentos ya superan el 15% y 4 superan el 50%. El tope departamental que se elimina era el único freno donde la compra extranjera se concentra: cordillera, lagos, nacientes de agua y frontera. Me preocupa además el silencio administrativo de 180 días en zonas de frontera.\n\nLe pido que considere estos datos al definir su posición sobre ese capítulo.\n\nGracias por su tiempo.\n\n[TU NOMBRE]\n[TU CIUDAD, PROVINCIA]`;
}
function gmailUrl(s) {
  return 'https://mail.google.com/mail/?view=cm&fs=1&to=' + encodeURIComponent(s.email)
    + '&su=' + encodeURIComponent('Pedido de un ciudadano sobre el capítulo de tierras')
    + '&body=' + encodeURIComponent(mailBody(s));
}

/* ---------- banner ---------- */
(function banner() {
  const b = document.getElementById('banner');
  b.classList.add(ESTADO.estado);
  document.getElementById('banner-titulo').textContent = ESTADO.titulo;
  document.getElementById('banner-detalle').textContent = ESTADO.detalle;
  document.getElementById('banner-fecha').textContent = 'Actualizado: ' + ESTADO.actualizado;
})();

/* ---------- sol de mayo: line-art fino, 32 rayos alternados ---------- */
function solDeMayo(size) {
  const c = el('canvas', { id: 'sol', width: size * 2, height: size * 2, role: 'img', 'aria-label': 'Sol de Mayo' });
  c.style.width = size + 'px'; c.style.height = size + 'px';
  const x = c.getContext('2d');
  x.scale(2, 2);
  const cx = size / 2, cy = size / 2, rIn = size * 0.16, rOut = size * 0.46;
  x.strokeStyle = '#C99C33'; x.lineWidth = 1.4; x.lineCap = 'round';
  x.beginPath(); x.arc(cx, cy, rIn, 0, Math.PI * 2); x.stroke();
  x.beginPath(); x.arc(cx, cy, rIn * 0.55, 0, Math.PI * 2); x.stroke();
  for (let i = 0; i < 32; i++) {
    const a = (i / 32) * Math.PI * 2;
    const x0 = cx + Math.cos(a) * (rIn + 3), y0 = cy + Math.sin(a) * (rIn + 3);
    const x1 = cx + Math.cos(a) * rOut, y1 = cy + Math.sin(a) * rOut;
    x.beginPath();
    if (i % 2 === 0) { x.moveTo(x0, y0); x.lineTo(x1, y1); }
    else {
      const mid = (rIn + rOut) / 2, wob = a + 0.09;
      x.moveTo(x0, y0);
      x.quadraticCurveTo(cx + Math.cos(wob) * mid, cy + Math.sin(wob) * mid, cx + Math.cos(a) * (rOut - 6), cy + Math.sin(a) * (rOut - 6));
    }
    x.stroke();
  }
  return c;
}

/* ---------- vistas ---------- */
function vistaHome() {
  app.textContent = '';
  const hero = el('header', { class: 'hero' });
  hero.append(solDeMayo(120));
  hero.append(el('h1', { class: 'display', text: '72 personas deciden quién puede comprar la Argentina.' }));
  hero.append(el('p', { class: 'baja', text: 'La Ley de Tierras se redefine en el Congreso. Conocé a tus senadores, mirá la postura de su bloque y escribiles hoy.' }));
  const pick = el('div', { class: 'prov-pick' });
  pick.append(el('label', { for: 'prov-hero', text: '¿De qué provincia sos?' }));
  const sel = el('select', { id: 'prov-hero', onchange: e => { filtro.prov = e.target.value; render(); document.getElementById('listado').scrollIntoView(); } });
  sel.append(el('option', { value: '', text: 'Elegí tu provincia' }));
  PROVINCIAS.forEach(p => sel.append(el('option', { value: p, text: p, ...(filtro.prov === p ? { selected: '' } : {}) })));
  pick.append(sel);
  hero.append(pick);
  app.append(hero, el('hr', { class: 'guarda' }));

  const nums = el('section', { class: 'numeros', 'aria-label': 'Datos del Registro Nacional de Tierras Rurales' });
  const nw = el('div', { class: 'wrap' });
  [['5%', 'de la tierra rural argentina está hoy en manos extranjeras: el promedio que se usa para justificar eliminar los límites.'],
   ['36', 'departamentos ya superan el tope del 15% que la nueva ley elimina.'],
   ['4', 'departamentos superan el 50%: Lácar, Gral. Lamadrid, Molinos y San Carlos.'],
   ['2,2M', 'de hectáreas tienen dueño de nacionalidad desconocida para el propio Estado.']]
  .forEach(([cifra, texto]) => {
    const d = el('div', { class: 'num' });
    d.append(el('div', { class: 'cifra' }, el('span', { class: 'display', text: cifra })));
    d.append(el('p', { text: texto }));
    nw.append(d);
  });
  nw.append(el('p', { class: 'fuente' },
    'Fuente: Registro Nacional de Tierras Rurales, vía ',
    el('a', { href: 'https://chequeado.com/investigacion/quienes-son-los-duenos-de-las-tierras-en-la-argentina/', target: '_blank', rel: 'noopener', text: 'Chequeado' }), '.'));
  nums.append(nw);
  app.append(nums);

  const tab = el('section', { class: 'tablero' });
  const tw = el('div', { class: 'wrap' });
  tw.append(el('h2', { class: 'seccion display', text: 'Así está el tablero' }));
  tw.append(el('p', { class: 'nota', text: 'Postura de cada BLOQUE frente al proyecto, según dictámenes de comisión y posiciones públicas. No es una predicción del voto individual de cada senador. Tocá una postura para filtrar.' }));
  const grid = el('div', { class: 'stances' });
  for (const [key, meta] of Object.entries(ST)) {
    const n = SEN.filter(s => s.postura === key).length;
    const b = el('button', {
      class: 'stance-card', style: `--sc:${meta.color}`,
      'aria-pressed': String(filtro.postura === key),
      onclick: () => { filtro.postura = filtro.postura === key ? '' : key; render(); },
    });
    b.append(el('div', { class: 'n', text: String(n) }));
    b.append(el('div', { class: 't', text: meta.corto }));
    b.append(el('div', { class: 'd', text: SEN.find(s => s.postura === key).posturaDesc }));
    grid.append(b);
  }
  tw.append(grid); tab.append(tw); app.append(tab);

  const lst = el('section', { class: 'listado', id: 'listado' });
  const lw = el('div', { class: 'wrap' });
  lw.append(el('h2', { class: 'seccion display', text: 'Los 72, provincia por provincia' }));
  const ctr = el('div', { class: 'controles' });
  ctr.append(el('input', { type: 'search', placeholder: 'Buscar por apellido…', value: filtro.q, 'aria-label': 'Buscar senador por nombre', oninput: e => { filtro.q = e.target.value; renderLista(); } }));
  const sp = el('select', { 'aria-label': 'Filtrar por provincia', onchange: e => { filtro.prov = e.target.value; renderLista(); } });
  sp.append(el('option', { value: '', text: 'Todas las provincias' }));
  PROVINCIAS.forEach(p => sp.append(el('option', { value: p, text: p, ...(filtro.prov === p ? { selected: '' } : {}) })));
  ctr.append(sp);
  lw.append(ctr);
  lw.append(el('div', { id: 'lista-cuerpo' }));
  lst.append(lw); app.append(lst);
  renderLista();

  app.append(seccionQueSeVota());
  document.title = 'El Senado y la Tierra — 72 senadores, una votación';
}

function norm(t) { return t.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, ''); }

function renderLista() {
  const cuerpo = document.getElementById('lista-cuerpo');
  if (!cuerpo) return;
  cuerpo.textContent = '';
  const q = norm(filtro.q || '');
  const match = s => (!filtro.prov || s.provincia === filtro.prov)
    && (!filtro.postura || s.postura === filtro.postura)
    && (!q || norm(s.apellido + ' ' + s.nombre).includes(q));
  const provs = filtro.prov ? [filtro.prov] : PROVINCIAS;
  let total = 0;
  for (const p of provs) {
    const grupo = SEN.filter(s => s.provincia === p && match(s));
    if (!grupo.length) continue;
    total += grupo.length;
    const abierto = Boolean(filtro.prov || filtro.q || filtro.postura);
    const det = el('details', { class: 'prov', ...(abierto ? { open: '' } : {}) });
    det.append(el('summary', {}, el('span', { text: p }), el('span', { class: 'cant', text: grupo.length + (grupo.length === 1 ? ' senador/a' : ' senadores') })));
    const cards = el('div', { class: 'cards' });
    grupo.sort((a, b) => a.apellido.localeCompare(b.apellido, 'es')).forEach(s => {
      const card = el('a', { class: 'card', href: '#/senador/' + s.slug, style: stanceVars(s) });
      card.append(el('span', { class: 'esc', 'aria-hidden': 'true', text: s.iniciales }));
      const q2 = el('span', { class: 'quien' });
      q2.append(el('span', { class: 'nom', text: `${s.apellido}, ${s.nombre}` }));
      q2.append(el('br'));
      q2.append(el('span', { class: 'chip', text: ST[s.postura].corto }));
      q2.append(el('span', { class: 'det', text: ' · ' + s.bloque }));
      card.append(q2);
      cards.append(card);
    });
    det.append(cards);
    cuerpo.append(det);
  }
  if (!total) {
    cuerpo.append(el('div', { class: 'vacio' },
      el('p', { text: 'Ningún senador coincide con esa búsqueda.' }),
      el('button', { class: 'btn', style: 'margin-top:10px', text: 'Limpiar filtros', onclick: () => { filtro = { prov: '', postura: '', q: '' }; render(); } })));
  }
}

function vistaPerfil(slug) {
  const s = SEN.find(x => x.slug === slug);
  app.textContent = '';
  const sec = el('section', { class: 'perfil' });
  const w = el('div', { class: 'wrap' });
  w.append(el('a', { class: 'volver', href: '#/', text: '← Todos los senadores' }));
  if (!s) {
    w.append(el('h1', { class: 'nombre display', text: 'No encontramos ese perfil' }));
    w.append(el('p', { class: 'meta', text: 'El link puede estar mal copiado. Volvé al listado y buscá por apellido o provincia.' }));
    sec.append(w); app.append(sec);
    document.title = 'Perfil no encontrado — El Senado y la Tierra';
    return;
  }
  const head = el('div', { class: 'perfil-head' });
  head.append(el('span', { class: 'esc grande', 'aria-hidden': 'true', text: s.iniciales }));
  head.append(el('h1', { class: 'nombre display', text: `${s.apellido}, ${s.nombre}` }));
  w.append(head);
  w.append(el('p', { class: 'meta', text: `Senador${s.genero === 'F' ? 'a' : ''} nacional por ${s.provincia} · ${s.bloque}${s.partido ? ' · ' + s.partido : ''}` }));

  const cols = el('div', { class: 'bloques2' });

  const izq = el('div', { class: 'panel', style: stanceVars(s) });
  izq.append(el('h3', { text: 'Postura del bloque frente a la Ley de Tierras' }));
  izq.append(el('div', { class: 'postura-linea', text: s.posturaLabel }));
  izq.append(el('p', { text: s.posturaDesc }));
  if (s.postura === 'juego' || s.postura === 'dictamen') {
    izq.append(el('p', { class: 'disclaimer', text: 'Esta es la postura pública del bloque, no una predicción del voto de ' + s.apellido + '. Su voto individual se conoce recién en la votación nominal.' }));
  }
  if (s.extPct || s.extNota) {
    const d = el('div', { class: 'dato-prov' });
    if (s.extPct) d.append(el('p', {}, el('strong', { text: s.extPct + ' de la tierra rural de ' + s.provincia }), ' ya está en manos extranjeras según el RNTR.'));
    if (s.extNota) d.append(el('p', { text: s.extNota }));
    izq.append(d);
  }
  izq.append(el('p', { class: 'mandato', text: 'Mandato: ' + (s.mandato[0] || '—') + ' → ' + (s.mandato[1] || '—') }));

  const der = el('div', { class: 'panel contacto' });
  der.append(el('h3', { text: 'Escribile' }));
  const filaMail = el('div', { class: 'fila-c' });
  filaMail.append(el('span', { class: 'email', text: s.email }));
  filaMail.append(el('button', { class: 'btn', text: 'Copiar', onclick: async ev => {
    try { await navigator.clipboard.writeText(s.email); ev.target.textContent = 'Copiado ✓'; }
    catch { window.prompt('Copiá el email:', s.email); }
    setTimeout(() => { ev.target.textContent = 'Copiar'; }, 2000);
  } }));
  der.append(filaMail);
  der.append(el('a', { class: 'btn primario', href: gmailUrl(s), target: '_blank', rel: 'noopener', text: '✉ Abrir mail redactado en Gmail' }));
  if (s.tel) der.append(el('p', { class: 'tel-nota', text: 'Teléfono: conmutador del Senado, interno ' + s.tel + '.' }));
  const redes = el('div', { class: 'redes' });
  if (s.tw) redes.append(el('a', { href: s.tw, target: '_blank', rel: 'noopener', text: 'X / Twitter' }));
  if (s.ig) redes.append(el('a', { href: s.ig, target: '_blank', rel: 'noopener', text: 'Instagram' }));
  if (s.fb) redes.append(el('a', { href: s.fb, target: '_blank', rel: 'noopener', text: 'Facebook' }));
  if (redes.childNodes.length) { der.append(el('h3', { style: 'margin-top:16px', text: 'Redes' })); der.append(redes); }
  der.append(el('p', { class: 'tel-nota', text: 'El mail se abre con un borrador respetuoso y con fuentes — completá tu nombre y ciudad antes de enviar. Un mensaje cordial pesa más que cien agresivos.' }));

  cols.append(izq, der);
  w.append(cols);
  const comp = el('div', { class: 'panel', style: 'margin-top:16px' });
  comp.append(el('h3', { text: 'Hacé circular este perfil' }));
  comp.append(el('p', { style: 'font-size:14px', text: 'Cada persona de ' + s.provincia + ' que le escribe suma. Compartí el perfil con gente de la provincia.' }));
  comp.append(shareRow(`${s.apellido} representa a ${s.provincia} en el Senado y la Ley de Tierras se define ahí. Mirá su postura y escribile:`));
  w.append(comp);
  sec.append(w);
  app.append(sec, seccionQueSeVota());
  document.title = `${s.apellido} — El Senado y la Tierra`;
  window.scrollTo(0, 0);
}

function seccionQueSeVota() {
  const sec = el('section', { class: 'quesevota', id: 'que-se-vota' });
  const w = el('div', { class: 'wrap' });
  w.append(el('h2', { class: 'seccion display', text: '¿Qué se vota, exactamente?' }));
  w.append(el('p', { class: 'nota', style: 'color:var(--tinta-70);font-size:14.5px;max-width:72ch', text: 'El proyecto de "Inviolabilidad de la Propiedad Privada" reescribe el régimen de tierras rurales vigente desde 2011, además de reformar expropiaciones y desalojos. Sobre tierras:' }));
  const cols = el('div', { class: 'cols' });
  const c1 = el('div');
  c1.append(el('h4', { text: 'Elimina' }));
  const u1 = el('ul');
  ['El tope del 15% de tierra rural en manos extranjeras (nacional, provincial y departamental).',
   'El límite del 30% por nacionalidad.',
   'El máximo de 1.000 hectáreas por titular extranjero en la zona núcleo.',
   'La prohibición sobre tierras con cuerpos de agua relevantes, según la última versión difundida (punto con versiones divergentes en prensa).']
   .forEach(t => u1.append(el('li', { text: t })));
  c1.append(u1);
  const c2 = el('div');
  c2.append(el('h4', { text: 'Mantiene o crea' }));
  const u2 = el('ul');
  ['Prohibición absoluta para Estados extranjeros.',
   'Empresas con participación estatal extranjera: doble autorización (provincia + Ejecutivo nacional).',
   'Zonas de frontera: doble autorización, pero con silencio administrativo positivo — si el Estado no responde en 180 días, la compra queda aprobada.',
   'Las provincias reciben la facultad de autorizar, regular o vetar ventas en su territorio.']
   .forEach(t => u2.append(el('li', { text: t })));
  c2.append(u2);
  cols.append(c1, c2);
  w.append(cols);
  w.append(el('p', { class: 'aclara' },
    'Trámite: el proyecto ingresó por el Senado. Si se aprueba obtiene media sanción y pasa a Diputados. Fuentes: ',
    el('a', { href: 'https://chequeado.com/el-explicador/claves-del-proyecto-de-ley-sobre-inviolabilidad-de-la-propiedad-privada-que-impulsa-el-gobierno-de-milei/', target: '_blank', rel: 'noopener', text: 'Chequeado' }), ' · ',
    el('a', { href: 'https://www.infobae.com/politica/2026/07/09/que-cambia-con-el-proyecto-que-modifica-la-ley-de-tierras-rurales-provincias-extranjeros-expropiaciones-y-desalojos/', target: '_blank', rel: 'noopener', text: 'Infobae' }), ' · ',
    el('a', { href: 'https://www.cronista.com/economia-politica/propiedad-privada-que-elimina-y-que-mantiene-el-senado-la-ultima-version-del-proyecto-de-sturzenegger/', target: '_blank', rel: 'noopener', text: 'El Cronista' }), ' · ',
    el('a', { href: 'https://www.senado.gob.ar/micrositios/DatosAbiertos/', target: '_blank', rel: 'noopener', text: 'Datos abiertos del Senado' }), '.'));
  sec.append(w);
  return sec;
}

function shareRow(texto) {
  const d = el('div', { class: 'redes', style: 'margin-top:14px' });
  const url = () => location.href;
  d.append(el('a', { class: 'btn', target: '_blank', rel: 'noopener',
    href: 'https://wa.me/?text=' + encodeURIComponent(texto + '\n' + location.href), text: 'Compartir por WhatsApp' }));
  d.append(el('a', { class: 'btn', target: '_blank', rel: 'noopener',
    href: 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(texto) + '&url=' + encodeURIComponent(location.href), text: 'Compartir en X' }));
  d.append(el('button', { class: 'btn', text: 'Copiar link', onclick: async ev => {
    try { await navigator.clipboard.writeText(url()); ev.target.textContent = 'Copiado ✓'; }
    catch { window.prompt('Copiá el link:', url()); }
    setTimeout(() => { ev.target.textContent = 'Copiar link'; }, 2000);
  } }));
  return d;
}

function footer() {
  const f = el('footer');
  const w = el('div', { class: 'wrap' });
  const d1 = el('div');
  d1.append(el('h4', { text: 'Metodología y fuentes' }));
  d1.append(el('p', { text: 'Datos de contacto, bloque y mandato: endpoint oficial de datos abiertos del Senado de la Nación (corte 16/07/2026). Datos de extranjerización: Registro Nacional de Tierras Rurales, vía la investigación de Chequeado. Las posturas mostradas son de BLOQUE, según dictámenes de comisión y posiciones públicas reportadas por prensa — no constituyen predicción del voto individual de ningún senador. Cuando exista votación nominal, este sitio se actualizará con el voto efectivo.' }));
  const d2 = el('div');
  d2.append(el('h4', { text: 'Quién hace esto' }));
  d2.append(el('p', { text: 'Proyecto ciudadano independiente, sin afiliación partidaria. Si encontrás un error en los datos, escribinos y lo corregimos con la fuente a la vista.' }));
  const d0 = el('div');
  d0.append(el('h4', { text: 'Hacé circular el sitio' }));
  d0.append(shareRow('72 personas deciden quién puede comprar la Argentina. Encontrá a tus senadores, mirá su postura sobre la Ley de Tierras y escribiles:'));
  const d3 = el('div', { class: 'en' });
  d3.append(el('p', { text: 'EN · Argentina’s Senate is debating a bill that removes the caps on foreign ownership of rural land (currently 15% per district). This citizen-run site profiles all 72 senators, their bloc’s position, and how to reach them. Sources: official Senate open data and the National Registry of Rural Land.' }));
  w.append(d0, d1, d2, d3);
  f.append(w);
  return f;
}

/* ---------- router ---------- */
function render() {
  const h = location.hash || '#/';
  const m = h.match(/^#\/senador\/([a-z0-9-]+)/);
  if (m) vistaPerfil(m[1]);
  else vistaHome();
  const viejo = document.querySelector('footer');
  if (viejo) viejo.remove();
  document.body.append(footer());
}
window.addEventListener('hashchange', render);
render();
</script>
