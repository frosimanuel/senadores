<title>El Senado y la Tierra — 72 senadores, una votación</title>
<meta name="description" content="La Ley de Tierras vuelve al Senado el 6 de agosto. Encontrá a tus senadores, mirá la postura de su bloque y escribiles en un click — el mail sale pre-armado.">
<style>
  :root {
    --celeste: #74ACDF;
    --celeste-suave: #E7F1FA;

  * { box-sizing: border-box; margin: 0; }
  html { scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }
  body {
    background: var(--fondo);

  /* Guarda divisoria: doble filete celeste, eco de documento patrio */

  .aviso-webview { background: var(--tinta); color: #D6E2EC; font-size: 13px; padding: 9px 20px; line-height: 1.45; }

  /* Banner de estado de votación */
  #banner { padding: 12px 0; font-size: 14.5px; border-bottom: 1px solid var(--borde); }

  /* Hero */

  }
  .kicker { font-size: 14.5px; color: var(--tinta-70); margin-bottom: 16px; text-wrap: balance; }

  .hero p.baja { max-width: 52ch; margin: 0 auto 26px; color: var(--tinta-70); font-size: 17.5px; text-wrap: balance; }
  .prov-pick { display: inline-flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .prov-pick label { font-size: 14px; letter-spacing: .06em; text-transform: uppercase; color: var(--tinta-70); }
  select, input[type="search"] {
    font: inherit; color: var(--tinta); background: #fff;

  }
  .prov-pick { max-width: 100%; }
  .mis-senadores { margin: 24px auto 0; max-width: 460px; background: #fff; border: 1px solid var(--borde); border-radius: 6px; padding: 20px 18px; }
  .mis-senadores .caras { display: flex; gap: 18px; justify-content: center; }

  /* Números RNTR */
  .numeros { background: var(--tinta); color: #EDF2F6; padding: 34px 0; }
  .numeros .wrap { display: grid; grid-template-columns: repeat(4, 1fr); gap: 26px; }

  /* Tablero de situación */
  .tablero { padding: 40px 0 8px; }

  .stances { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  @media (max-width: 760px) { .stances { grid-template-columns: 1fr 1fr; } }
  .stance-card {
    text-align: left; font: inherit; cursor: pointer; background: #fff;

  }
  .stance-card[aria-pressed="true"] { background: var(--celeste-suave); border-color: var(--celeste); border-top-color: var(--sc); }
  .stance-card .n { font-size: 30px; font-variant-numeric: tabular-nums; color: var(--sc); }
  .stance-card .t { font-weight: 600; font-size: 14px; }

  /* Controles + listado */
  .listado { padding: 26px 0 60px; }
  .controles { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }

  .controles select { max-width: 46%; }
  details.prov { border: 1px solid var(--borde); border-radius: 4px; background: #fff; margin-bottom: 10px; }

    cursor: pointer; padding: 13px 16px; font-weight: 600; display: flex; gap: 10px; align-items: baseline; list-style: none;

  details.prov summary::-webkit-details-marker { display: none; }
  details.prov summary::before { content: "▸"; color: var(--dorado-texto); font-size: 13px; transition: transform .15s; }
  @media (prefers-reduced-motion: reduce) { details.prov summary::before { transition: none; } }
  details.prov[open] summary::before { transform: rotate(90deg); }
  details.prov summary .cant { color: var(--tinta-70); font-weight: 400; font-size: 13px; margin-left: auto; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; padding: 4px 12px 14px; }

  .card {
    display: flex; gap: 12px; align-items: center; padding: 12px;

  }
  .card:hover { border-color: var(--celeste); }
  .esc { flex: none; width: 46px; height: 46px; border-radius: 50%; background: #fff;
    border: 2px solid var(--celeste); display: grid; place-items: center;
    font-size: 15px; letter-spacing: .04em; color: var(--tinta); }
  .esc.grande { width: 76px; height: 76px; font-size: 24px; border-width: 3px; }

  .card .quien { min-width: 0; }
  .card .nom { font-weight: 600; font-size: 15px; line-height: 1.3; }
  .card .det { font-size: 12.5px; color: var(--tinta-70); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chip { display: inline-flex; gap: 5px; align-items: baseline; font-size: 12px; font-weight: 600; color: var(--sc); }
  .chip::before { content: var(--ic); font-size: 10px; }
  .vacio { padding: 30px; text-align: center; color: var(--tinta-70); background: #fff; border: 1px dashed var(--borde); border-radius: 4px; }

  /* Perfil */
  .perfil { padding: 36px 0 60px; }
  .volver { display: inline-block; margin-bottom: 24px; font-size: 14px; }
  .perfil-head { display: flex; gap: 20px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
  .perfil h1.nombre { font-size: clamp(28px, 4vw, 42px); margin: 0; text-align: left; max-width: none; }
  .perfil .meta { color: var(--tinta-70); font-size: 15px; margin-bottom: 22px; }
  .bloques2 { display: grid; grid-template-columns: 1.2fr .8fr; gap: 16px; align-items: start; }
  @media (max-width: 760px) { .bloques2 { grid-template-columns: 1fr; } .bloques2 .contacto { order: -1; } }
  .panel { background: #fff; border: 1px solid var(--borde); border-radius: 4px; padding: 18px; }
  .panel h3 { font-size: 13px; letter-spacing: .07em; text-transform: uppercase; color: var(--tinta-70); margin-bottom: 10px; font-weight: 600; }
  .panel .postura-linea { display: flex; gap: 8px; align-items: baseline; font-weight: 600; color: var(--sc); margin-bottom: 6px; }
  .panel .postura-linea::before { content: var(--ic); }
  .panel p { font-size: 14.5px; }
  .panel p + p { margin-top: 8px; }
  .disclaimer { font-size: 13px; color: var(--tinta-70); border-left: 3px solid var(--dorado); padding-left: 10px; margin-top: 12px; }
  .dato-prov { margin-top: 14px; font-size: 14px; background: var(--celeste-suave); border-radius: 4px; padding: 10px 12px; }
  .contacto .fila-c { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
  .contacto .email { font-variant-numeric: tabular-nums; font-size: 14.5px; word-break: break-all; }
  .btn {
    display: inline-block; font: inherit; font-size: 14px; font-weight: 600; cursor: pointer;
    border-radius: 3px; padding: 9px 14px; text-decoration: none; border: 1px solid var(--tinta);
    background: #fff; color: var(--tinta);
  }
  .btn.primario { background: var(--tinta); color: #fff; }
  .btn.primario:hover { background: var(--st-impulsa); }
  .redes { display: flex; gap: 12px; flex-wrap: wrap; font-size: 14px; margin-top: 4px; }
  .mandato { font-size: 13.5px; color: var(--tinta-70); margin-top: 12px; }
  .tel-nota { font-size: 13.5px; color: var(--tinta-70); margin-top: 8px; }

  /* Qué se vota */
  .quesevota { background: #fff; border-top: 1px solid var(--borde); padding: 46px 0; }
  .quesevota .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; margin-top: 18px; }
  @media (max-width: 760px) { .quesevota .cols { grid-template-columns: 1fr; } }
  .quesevota h4 { font-size: 15px; margin-bottom: 8px; }
  .quesevota ul { padding-left: 18px; font-size: 14.5px; }
  .quesevota li { margin-bottom: 7px; }
  .quesevota .aclara { font-size: 13px; color: var(--tinta-70); margin-top: 14px; max-width: 75ch; }

  /* Modo campaña */
  .camp-grupos { display: flex; gap: 8px; flex-wrap: wrap; margin: 18px 0 6px; }

  .camp-prog { margin: 14px 0 20px; }
  .camp-prog .txt { font-size: 14px; font-weight: 600; margin-bottom: 6px; font-variant-numeric: tabular-nums; }
  .camp-prog .barra { height: 8px; background: var(--borde); border-radius: 4px; overflow: hidden; }
  .camp-prog .barra > div { height: 100%; background: var(--dorado); border-radius: 4px; transition: width .2s; }
  @media (prefers-reduced-motion: reduce) { .camp-prog .barra > div { transition: none; } }
  .btn-gmail { display: inline-flex; align-items: center; gap: 8px; }
  .btn-gmail .ic { display: inline-flex; background: #fff; border-radius: 3px; padding: 3px 4px; }
  .kit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; margin-top: 14px; }
  .kit-card img { width: 100%; border: 1px solid var(--borde); border-radius: 4px; display: block; }
  .kit-acciones { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .kit-acciones .btn { font-size: 13px; padding: 7px 10px; }
  .camp-datos { margin: 14px 0 4px; }
  .camp-datos .t { font-size: 13.5px; color: var(--tinta-70); margin-bottom: 8px; }
  .camp-datos .fila-datos { display: flex; gap: 10px; flex-wrap: wrap; }
  .camp-datos input { flex: 1; min-width: 150px; font-size: 14.5px; }
  .camp-rapido { background: var(--celeste-suave); border: 1px solid var(--celeste); border-radius: 4px; padding: 14px 16px; margin: 12px 0 18px; }
  .camp-rapido .t { font-weight: 600; font-size: 15px; }
  .camp-rapido .d { font-size: 13.5px; color: var(--tinta-70); margin-top: 3px; max-width: 62ch; }
  .camp-tools { display: flex; gap: 12px; align-items: center; justify-content: space-between; flex-wrap: wrap; margin: -8px 0 16px; }
  .camp-orden { font-size: 14px; color: var(--tinta-70); display: inline-flex; gap: 8px; align-items: center; }
  .camp-orden select { padding: 7px 10px; font-size: 14px; }
  .camp-row {
    display: flex; gap: 12px; align-items: center; padding: 10px 12px; margin-bottom: 8px;
    background: #fff; border: 1px solid var(--borde); border-radius: 4px;
  }
  .camp-row.enviado { background: var(--fondo); }
  .camp-row.enviado .quien { opacity: .55; }
  .camp-row .quien { flex: 1; min-width: 0; }
  .camp-row .nom { font-weight: 600; font-size: 15px; }
  .camp-row .det { font-size: 12.5px; color: var(--tinta-70); }
  .camp-row .acciones { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .camp-check { font: inherit; font-size: 13px; cursor: pointer; background: none; border: 1px solid var(--borde); border-radius: 3px; padding: 8px 10px; color: var(--tinta-70); }
  .camp-row.enviado .camp-check { color: var(--dorado-texto); border-color: var(--dorado); font-weight: 600; }
  @media (max-width: 560px) { .camp-row { flex-wrap: wrap; } .camp-row .acciones { width: 100%; justify-content: flex-start; } }

  /* Footer */
  footer { background: var(--tinta); color: #B9C6D1; padding: 40px 0 50px; font-size: 13.5px; }
  footer .wrap { display: grid; gap: 18px; }
  footer h4 { color: #EDF2F6; font-size: 13px; letter-spacing: .07em; text-transform: uppercase; margin-bottom: 6px; }
  footer a { color: #D6E2EC; }
  .skip { position: absolute; left: -9999px; top: 0; background: #fff; padding: 10px; z-index: 10; }

</style>

<script>
"use strict";
const SEN = JSON.parse(document.getElementById('data-senadores').textContent);
const ESTADO = JSON.parse(document.getElementById('data-estado').textContent);

const ST = {
  impulsa:  { ic: '"▲"', color: 'var(--st-impulsa)',  corto: 'Impulsa' },
  dictamen: { ic: '"◆"', color: 'var(--st-dictamen)', corto: 'Dictamen de mayoría' },
  juego:    { ic: '"●"', color: 'var(--st-juego)',    corto: 'Voto en juego' },
  rechaza:  { ic: '"▼"', color: 'var(--st-rechaza)',  corto: 'Rechaza' },
};
const PROVINCIAS = [...new Set(SEN.map(s => s.provincia))].sort((a, b) => a.localeCompare(b, 'es'));

/* Entorno: dentro del visor embebido de Instagram/Facebook/etc, Google bloquea
   el login de Gmail web. En móvil usamos mailto: (lo maneja el sistema y abre
   la app de mail ya logueada); en desktop, Gmail web. */
const UA_NAV = navigator.userAgent || '';
const EN_WEBVIEW = /Instagram|FBAN|FBAV|FB_IAB|Line\/|TikTok|BytedanceWebview|Twitter/i.test(UA_NAV);
const ES_MOVIL = /Android|iPhone|iPad|iPod/i.test(UA_NAV) || EN_WEBVIEW;
const app = document.getElementById('app');
let filtro = { prov: '', postura: '', q: '' };
try { filtro.prov = localStorage.getItem('provincia') || ''; } catch {}

/* ---------- helpers (todo texto va por textContent — nunca innerHTML con datos) ---------- */
function el(tag, attrs, ...hijos) {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === 'text') n.textContent = v;
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), v);
    else n.setAttribute(k, v);
  }
  for (const h of hijos) if (h) n.append(h);
  return n;
}
function stanceVars(s) { return `--sc:${ST[s.postura].color};--ic:${ST[s.postura].ic}`; }

/* Medallón: foto oficial del Senado si está disponible; si no (o si la CSP
   del entorno bloquea la carga), caen las iniciales. */
function medallon(s, grande) {
  const esc = el('span', { class: 'esc' + (grande ? ' grande' : ''), 'aria-hidden': 'true' });
  const img = el('img', { src: 'fotos/' + s.slug + '.jpg', alt: '', loading: 'lazy' });
  img.addEventListener('error', () => { img.remove(); esc.textContent = s.iniciales; });
  esc.append(img);
  return esc;
}

function mailBody(s) {
  const saludo = s.genero === 'F' ? 'Estimada Senadora' : 'Estimado Senador';
  return conRemitente(`${saludo} ${s.apellido}:\n\nMe llamo [TU NOMBRE], soy ciudadano/a de [TU CIUDAD, PROVINCIA]. Le escribo por el proyecto de Inviolabilidad de la Propiedad Privada y su capítulo sobre la Ley de Tierras Rurales 26.737, que vuelve al recinto el 6 de agosto.\n\nEl promedio nacional de extranjerización (5%) esconde el dato relevante: según el Registro Nacional de Tierras Rurales, 36 departamentos ya superan el 15% y 4 superan el 50%. El tope departamental que se elimina era el único freno donde la compra extranjera se concentra: cordillera, lagos, nacientes de agua y frontera. Me preocupa además el silencio administrativo de 180 días en zonas de frontera.\n\nLe pido que considere estos datos al definir su posición sobre ese capítulo antes de la sesión del 6 de agosto.\n\nGracias por su tiempo.\n\n[TU NOMBRE]\n[TU CIUDAD, PROVINCIA]`);
}
/* Logo de Gmail inline (estático — nunca lleva datos) sobre chip blanco */
const GMAIL_SVG = '<svg width="15" height="12" viewBox="0 0 24 18" aria-hidden="true" focusable="false"><path fill="#4285f4" d="M1.636 18h3.819V9.273L0 5.182v11.182C0 17.269.732 18 1.636 18z"/><path fill="#34a853" d="M18.545 18h3.819c.904 0 1.636-.731 1.636-1.636V5.182l-5.455 4.091z"/><path fill="#fbbc04" d="M18.545 3v6.273L24 5.182V3.818c0-2.023-2.309-3.177-3.927-1.964z"/><path fill="#ea4335" d="M5.455 9.273V3l6.545 4.91L18.545 3v6.273L12 14.182z"/><path fill="#c5221f" d="M0 3.818v1.364l5.455 4.091V3L3.927 1.854C2.309.64 0 1.795 0 3.818z"/></svg>';
function btnGmail(attrs, texto) {
  const fallback = attrs.fallback;
  const clickExtra = attrs.onclick;
  delete attrs.fallback;
  delete attrs.onclick;
  const base = { class: 'btn primario btn-gmail', rel: 'noopener' };
  if (String(attrs.href || '').startsWith('http')) base.target = '_blank';
  const a = el('a', Object.assign(base, attrs, {
    onclick: ev => {
      if (clickExtra) clickExtra(ev);
      if (fallback) armarFallback(fallback);
      const lbl = ev.currentTarget.querySelector('.lbl');
      if (lbl) { lbl.textContent = 'Abriendo…'; setTimeout(() => { lbl.textContent = texto; }, 2500); }
    },
  }));
  const ic = el('span', { class: 'ic', 'aria-hidden': 'true' });
  ic.innerHTML = GMAIL_SVG;
  a.append(ic, el('span', { class: 'lbl', text: texto }));
  return a;
}

/* Countdown a la sesión del 6 de agosto */
const DIA_SESION = new Date('2026-08-06T12:00:00-03:00');
function diasALaSesion() { return Math.ceil((DIA_SESION - new Date()) / 86400000); }
function textoCountdown() {
  const d = diasALaSesion();
  if (d > 1) return `Faltan ${d} días`;
  if (d === 1) return 'Es mañana';
  if (d === 0) return 'Es hoy';
  return '';
}

/* Provincia elegida, persistida entre visitas */
function provGet() { try { return localStorage.getItem('provincia') || ''; } catch { return window.__provMem || ''; } }
function provSet(p) { try { localStorage.setItem('provincia', p); } catch { window.__provMem = p; } }

/* Remitente guardado en este navegador: se inyecta en los borradores */
function remitenteGet() {
  try { return JSON.parse(localStorage.getItem('remitente') || '{}'); }
  catch { return window.__remMem || {}; }
}
function remitenteSet(o) {
  try { localStorage.setItem('remitente', JSON.stringify(o)); }
  catch { window.__remMem = o; }
}
function conRemitente(texto) {
  const r = remitenteGet();
  if (r.nombre) texto = texto.split('[TU NOMBRE]').join(r.nombre);
  if (r.ciudad) texto = texto.split('[TU CIUDAD, PROVINCIA]').join(r.ciudad);
  return texto;
}

const ASUNTO = 'Antes del 6 de agosto: pedido de un ciudadano sobre el capítulo de tierras';
function gmailUrl(s) {
  return 'https://mail.google.com/mail/?view=cm&fs=1&to=' + encodeURIComponent(s.email)
    + '&su=' + encodeURIComponent(ASUNTO)
    + '&body=' + encodeURIComponent(mailBody(s));
}
function mailtoUrl(s) {

/* App de Gmail (iOS/Android) vía su URL scheme. En iOS, mailto: cae en Apple

function armarFallback(url) {
  const t = setTimeout(() => { if (!document.hidden) location.href = url; }, 1400);
  const cancelar = () => { if (document.hidden) clearTimeout(t); };
  document.addEventListener('visibilitychange', cancelar, { once: true });
  window.addEventListener('pagehide', () => clearTimeout(t), { once: true });
}

/* Links externos que en móvil saltan a la app nativa (Instagram, X, WhatsApp)

  const base = Object.assign({ rel: 'noopener' }, attrs);
  if (ES_MOVIL && appUrl) {

  return el('a', Object.assign(base, { href: webUrl, target: '_blank' }));
}

/* ---------- sol de mayo: line-art fino, 32 rayos alternados ---------- */
function solDeMayo(size) {
  const c = el('canvas', { id: 'sol', width: size * 2, height: size * 2, role: 'img', 'aria-label': 'Sol de Mayo' });
  c.style.width = size + 'px'; c.style.height = size + 'px';
  const x = c.getContext('2d');
  x.scale(2, 2);
  const cx = size / 2, cy = size / 2, rIn = size * 0.16, rOut = size * 0.46;
  x.strokeStyle = '#C99C33'; x.lineWidth = 1.4; x.lineCap = 'round';
  x.beginPath(); x.arc(cx, cy, rIn, 0, Math.PI * 2); x.stroke();
  x.beginPath(); x.arc(cx, cy, rIn * 0.55, 0, Math.PI * 2); x.stroke();
  for (let i = 0; i < 32; i++) {
    const a = (i / 32) * Math.PI * 2;
    const x0 = cx + Math.cos(a) * (rIn + 3), y0 = cy + Math.sin(a) * (rIn + 3);
    const x1 = cx + Math.cos(a) * rOut, y1 = cy + Math.sin(a) * rOut;
    x.beginPath();
    if (i % 2 === 0) { x.moveTo(x0, y0); x.lineTo(x1, y1); }
    else {
      const mid = (rIn + rOut) / 2, wob = a + 0.09;
      x.moveTo(x0, y0);
      x.quadraticCurveTo(cx + Math.cos(wob) * mid, cy + Math.sin(wob) * mid, cx + Math.cos(a) * (rOut - 6), cy + Math.sin(a) * (rOut - 6));
    }
    x.stroke();
  }
  return c;
}

function norm(t) { return t.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, ''); }

function renderLista() {
  const cuerpo = document.getElementById('lista-cuerpo');
  if (!cuerpo) return;
  cuerpo.textContent = '';
  const q = norm(filtro.q || '');
  const match = s => (!filtro.prov || s.provincia === filtro.prov)
    && (!filtro.postura || s.postura === filtro.postura)
    && (!q || norm(s.apellido + ' ' + s.nombre).includes(q));
  const provs = filtro.prov ? [filtro.prov] : PROVINCIAS;
  let total = 0;
  for (const p of provs) {
    const grupo = SEN.filter(s => s.provincia === p && match(s));
    if (!grupo.length) continue;
    total += grupo.length;
    const abierto = Boolean(filtro.prov || filtro.q || filtro.postura);
    const det = el('details', { class: 'prov', ...(abierto ? { open: '' } : {}) });
    det.append(el('summary', {}, el('span', { text: p }), el('span', { class: 'cant', text: grupo.length + (grupo.length === 1 ? ' senador/a' : ' senadores') })));
    const cards = el('div', { class: 'cards' });
    grupo.sort((a, b) => a.apellido.localeCompare(b.apellido, 'es')).forEach(s => {
      const card = el('a', { class: 'card', href: '#/senador/' + s.slug, style: stanceVars(s) });
      card.append(medallon(s));
      const q2 = el('span', { class: 'quien' });
      q2.append(el('span', { class: 'nom', text: `${s.apellido}, ${s.nombre}` }));
      q2.append(el('br'));
      q2.append(el('span', { class: 'chip', text: ST[s.postura].corto }));
      q2.append(el('span', { class: 'det', text: ' · ' + s.bloque }));
      card.append(q2);
      cards.append(card);
    });
    det.append(cards);
    cuerpo.append(det);
  }
  if (!total) {
    cuerpo.append(el('div', { class: 'vacio' },
      el('p', { text: 'Ningún senador coincide con esa búsqueda.' }),
      el('button', { class: 'btn', style: 'margin-top:10px', text: 'Limpiar filtros', onclick: () => { filtro = { prov: '', postura: '', q: '' }; render(); } })));
  }
}

function enviadosSet(m) {
  try { localStorage.setItem('campania-enviados', JSON.stringify(m)); }

function marcarEnviado(slug, valor) {

/* ---------- generador de stories (1080×1920, todo client-side) ---------- */
function storyWrap(ctx, texto, cx, y, maxW, lineH) {
  const palabras = texto.split(' ');
  let linea = '';
  for (const p of palabras) {
    const prueba = linea ? linea + ' ' + p : p;
    if (ctx.measureText(prueba).width > maxW && linea) {
      ctx.fillText(linea, cx, y); y += lineH; linea = p;
    } else linea = prueba;
  }
  if (linea) { ctx.fillText(linea, cx, y); y += lineH; }
  return y;
}

function storyFoto(src) {
  return new Promise(res => {
    const i = new Image();
    i.onload = () => res(i);
    i.onerror = () => res(null);
    setTimeout(() => res(null), 2500);
    i.src = src;
  });
}

function storySol(x, cx, cy, rIn, rOut) {
  x.strokeStyle = '#C99C33'; x.lineWidth = 3; x.lineCap = 'round';
  x.beginPath(); x.arc(cx, cy, rIn, 0, Math.PI * 2); x.stroke();
  x.beginPath(); x.arc(cx, cy, rIn * 0.55, 0, Math.PI * 2); x.stroke();
  for (let i = 0; i < 32; i++) {
    const a = (i / 32) * Math.PI * 2;
    const rO = i % 2 === 0 ? rOut : rOut * 0.72;
    x.beginPath();
    x.moveTo(cx + Math.cos(a) * (rIn + 8), cy + Math.sin(a) * (rIn + 8));
    x.lineTo(cx + Math.cos(a) * rO, cy + Math.sin(a) * rO);
    x.stroke();
  }
}

const F_SERIF = 'Didot, "Bodoni 72", "Playfair Display", Georgia, serif';
const F_SANS = '-apple-system, Helvetica, Arial, sans-serif';

async function generarStory(opts) {
  const W = 1080, H = 1920;
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const x = c.getContext('2d');
  x.fillStyle = '#14212E'; x.fillRect(0, 0, W, H);
  x.fillStyle = '#74ACDF'; x.fillRect(0, 0, W, 14);
  storySol(x, W / 2, 330, 88, 240);

  x.textAlign = 'center';
  x.fillStyle = '#C99C33';
  x.font = `600 34px ${F_SANS}`;
  x.fillText('E L   S E N A D O   Y   L A   T I E R R A', W / 2, 660);

  x.fillStyle = '#FAFBFC';
  x.font = `500 92px ${F_SERIF}`;
  let y = storyWrap(x, opts.titulo, W / 2, 780, 900, 106);

  // Fotos circulares (si cargan; en el Artifact la CSP las bloquea y se omiten)
  const fotos = (await Promise.all((opts.fotos || []).slice(0, 3).map(storyFoto))).filter(Boolean);
  if (fotos.length) {
    const r = 105, gap = 60;
    const total = fotos.length * r * 2 + (fotos.length - 1) * gap;
    let fx = (W - total) / 2 + r;
    const fy = y + 130;
    for (const f of fotos) {
      x.save();
      x.beginPath(); x.arc(fx, fy, r, 0, Math.PI * 2); x.clip();
      x.drawImage(f, fx - r, fy - r, r * 2, r * 2);
      x.restore();
      x.strokeStyle = '#74ACDF'; x.lineWidth = 7;
      x.beginPath(); x.arc(fx, fy, r, 0, Math.PI * 2); x.stroke();
      fx += r * 2 + gap;
    }
    y = fy + r + 90;
  } else {
    y += 70;
  }

  x.fillStyle = '#C99C33'; x.fillRect(W / 2 - 70, y, 140, 6);
  y += 90;

  x.fillStyle = '#DEBA69';
  x.font = `600 52px ${F_SANS}`;
  const cd = textoCountdown();
  y = storyWrap(x, 'Vuelve al Senado el 6 de agosto' + (cd ? ` — ${cd.toLowerCase()}.` : '.'), W / 2, y, 880, 66);
  y += 40;

  x.fillStyle = '#D6E2EC';
  x.font = `400 44px ${F_SANS}`;
  y = storyWrap(x, opts.cta, W / 2, y, 860, 60);

  x.fillStyle = '#74ACDF';
  x.font = `600 46px ${F_SANS}`;
  x.fillText('0xdwb.is-a.dev/senadores', W / 2, 1800);

  return new Promise(res => c.toBlob(res, 'image/png'));
}

function btnStory(opts) {
  return el('button', { class: 'btn', text: 'Historia para Instagram', onclick: async ev => {
    const boton = ev.target;
    boton.textContent = 'Armando…';
    try {
      const blob = await generarStory(opts);
      const file = new File([blob], 'senado-y-la-tierra.png', { type: 'image/png' });
      // El link no puede ir clickeable dentro de la imagen: lo copiamos para
      // que pegarlo en el sticker de enlace de Instagram sea un toque.
      try { await navigator.clipboard.writeText('https://0xdwb.is-a.dev/senadores/'); } catch {}
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file] }).catch(() => {});
        boton.textContent = 'Link copiado ✓ — pegalo en el sticker de enlace';
        setTimeout(() => { boton.textContent = 'Historia para Instagram'; }, 5000);
      } else {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'senado-y-la-tierra.png';
        a.click();
        boton.textContent = 'Descargada ✓ y link copiado — subila con el sticker de enlace';
        setTimeout(() => { boton.textContent = 'Historia para Instagram'; }, 5000);
      }
    } catch {
      boton.textContent = 'Historia para Instagram';
    }
  } });
}

function footer() {
  const f = el('footer');
  const w = el('div', { class: 'wrap' });
  const d1 = el('div');
  d1.append(el('h4', { text: 'Metodología y fuentes' }));
  d1.append(el('p', { text: 'Datos de contacto, bloque y mandato: endpoint oficial de datos abiertos del Senado de la Nación (corte 16/07/2026). Datos de extranjerización: Registro Nacional de Tierras Rurales, vía la investigación de Chequeado. Las posturas mostradas son de BLOQUE, según dictámenes de comisión y posiciones públicas reportadas por prensa — no constituyen predicción del voto individual de ningún senador. Cuando exista votación nominal, este sitio se actualizará con el voto efectivo.' }));
  const d2 = el('div');
  d2.append(el('h4', { text: 'Quién hace esto' }));
  d2.append(el('p', { text: 'Proyecto ciudadano independiente, sin afiliación partidaria. Si encontrás un error en los datos, escribinos y lo corregimos con la fuente a la vista.' }));
  const d0 = el('div');
  d0.append(el('h4', { text: 'Hacé circular el sitio' }));
  const filaFoot = shareRow('La Ley de Tierras no se votó el 16/7 por falta de votos: vuelve al Senado el 6 de agosto. Encontrá a tus senadores y escribiles — el mail sale pre-armado, tardás un minuto:');
  filaFoot.append(btnStory({
    titulo: '72 personas deciden quién puede comprar la Argentina.',
    cta: 'Encontrá a tus senadores y escribiles: el mail sale pre-armado.',
    fotos: [],
  }));
  d0.append(filaFoot);
  d0.append(el('p', { style: 'margin-top:12px;display:flex;gap:16px;flex-wrap:wrap' },
    el('a', { href: '#/campania', text: 'Escribiles a varios de una vez →' }),
    el('a', { href: '#/difusion', text: 'Kit de difusión →' })));
  w.append(d0, d1, d2);
  f.append(w);
  return f;
}

/* ---------- router ---------- */
function render() {
  const h = location.hash || '#/';
  const m = h.match(/^#\/senador\/([a-z0-9-]+)/);
  if (m) vistaPerfil(m[1]);
  else if (h.startsWith('#/campania')) vistaCampania();
  else if (h.startsWith('#/difusion')) vistaDifusion();
  else vistaHome();
  const viejo = document.querySelector('footer');
  if (viejo) viejo.remove();
  document.body.append(footer());
}
window.addEventListener('hashchange', render);
render();
</script>
